[filters.jj]
description = "Compact Jujutsu (jj) output — strip hints, truncate metadata"
match_command = "^jj\\b"
strip_ansi = true

[filters.jj.replace]
# Compact common jj prefixes
"zzzzzzzz root()" = "root()"

[filters.jj.strip_lines_matching]
patterns = [
  "^\\s*$",
  "^Hint:",
  "^Working copy now at:",
  "^Added .* files",
  "^Removed .* files",
  "^Nothing changed",
  "^Rebased ",
  "^Parent commit:",
  "^Branch .* pointing to",
]

[filters.jj.truncate_lines_at]
value = 120

[filters.jj.head_lines]
value = 40

[[tests.jj]]
name = "log output stripped of hints"
input = """@  qpvuntsm patrick@example.com 2026-03-10 12:00 abc123
│  feat: add new feature
◉  zzzzzzzz root()

Working copy now at: qpvuntsm abc123 feat: add new feature
Hint: use `jj log` to see the full history
"""
expected_contains = "qpvuntsm"

[[tests.jj]]
name = "jj status compact"
input = """Parent commit: qpvuntsm abc123 feat: feature
Working copy : rlvkpnrz def456
Modified files:
  src/main.rs
  src/lib.rs

Nothing changed.
"""
expected_contains = "src/main.rs"
