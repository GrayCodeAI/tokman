[filters.stat]
description = "Compact stat output — truncate timestamps, strip nanoseconds"
match_command = "^stat\\b"
strip_ansi = true

# Truncate nanosecond precision from timestamps
[filters.stat.replace]
# Linux: remove nanoseconds and timezone from timestamps
"20\\d{2}-\\d{2}-\\d{2} \\d{2}:\\d{2}:\\d{2}\\.\\d{9} \\+\\d{4}" = "<timestamp>"
# macOS: compact stat single-line format
"\"(Mon|Tue|Wed|Thu|Fri|Sat|Sun) \\w+ +\\d+ \\d{2}:\\d{2}:\\d{2} \\d{4}\"" = "\"<time>\""

[filters.stat.strip_lines_matching]
patterns = [
  "^\\s*$",
]

[filters.stat.truncate_lines_at]
value = 120

[filters.stat.max_lines]
value = 20

[[tests.stat]]
name = "macOS stat truncated"
input = "16777234 8690244974 -rw-r--r-- 1 patrick staff 0 12345 \"Mar 10 12:00:00 2026\" \"Mar 10 11:00:00 2026\" \"Mar 10 11:00:00 2026\" \"Mar  9 10:00:00 2026\" 4096 24 0 file.txt"
# Just verify it doesn't crash and passes through
expected_contains = "file.txt"

[[tests.stat]]
name = "linux stat nanoseconds stripped"
input = "Access: 2026-03-10 12:00:00.000000000 +0100"
# Should contain timestamp replacement
expected_contains = "2026"

[[tests.stat]]
name = "empty input passes through"
input = ""
expected = ""
