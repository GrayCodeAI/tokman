[filters.wget]
description = "Compact wget download output — strip progress, keep summary"
match_command = "^wget\\b"
strip_ansi = true

[filters.wget.strip_lines_matching]
patterns = [
  "^\\s*$",
  "^--\\d{4}-\\d{2}-\\d{2}",
  "^Connecting to",
  "^HTTP request sent",
  "^Length:",
  "^Saving to:",
  "^\\s*\\d+[KMGT]?\\s",
  "^\\s*\\d+%",
  "^\\s*\\d+K",
  "^\\s*\\d+M",
]

[filters.wget.replace]
"saved \\[\\d+/\\d+\\]" = "saved"

[filters.wget.max_lines]
value = 20

[[tests.wget]]
name = "download complete"
input = """
--2026-03-10 12:00:00--  https://example.com/file.tar.gz
Resolving example.com... 93.184.216.34
Connecting to example.com|93.184.216.34|:443... connected.
HTTP request sent, awaiting response... 200 OK
Length: 1048576 (1.0M) [application/gzip]
Saving to: 'file.tar.gz'

file.tar.gz         100%[===================>]   1.00M  5.23MB/s    in 0.2s

2026-03-10 12:00:01 (5.23 MB/s) - 'file.tar.gz' saved [1048576/1048576]
"""
expected_contains = "file.tar.gz"

[[tests.wget]]
name = "empty input"
input = ""
expected = ""
