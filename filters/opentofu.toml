# OpenTofu IaC filter
schema_version = 1

[tofu_init]
match_command = "^tofu(\\s+init)?(\\s+.*)?$"
strip_ansi = true
strip_lines_matching = [
    "^Initializing the backend\\.\\.\\.",
    "^Initializing provider plugins\\.\\.\\.",
    "^- Finding .*",
    "^- Installing .*",
    "^OpenTofu has been successfully initialized",
    "^$",
]
on_empty = "OpenTofu initialized"

[tofu_plan]
match_command = "^tofu(\\s+plan)?(\\s+.*)?$"
strip_ansi = true
strip_lines_matching = [
    "^Refreshing OpenTofu state",
    "^- .*",
]
keep_lines_matching = [
    "Plan:.*",
    "No changes\\..*",
    "Error:.*",
    "Warning:.*",
]
max_lines = 50
on_empty = "No changes"

[tofu_apply]
match_command = "^tofu(\\s+apply)?(\\s+.*)?$"
strip_ansi = true
keep_lines_matching = [
    "Apply complete\\!.*",
    "Resources:.*",
    "Error:.*",
    "Warning:.*",
]
max_lines = 30