linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - gosec
    - prealloc
    - unconvert
    - unparam
    - misspell
    - gofmt
    - goimports
    - bodyclose
    - nilerr
    - exportloopref
    - copyloopvar
    - noctx

linters-settings:
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
      - style
  gosec:
    excludes:
      - G304  # file path is user-controlled (expected in CLI tool)
  prealloc:
    simple: true
    range-loops: true
    for-loops: true
  misspell:
    locale: US

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - unparam
    - path: internal/toml/builtin/
      linters:
        - unused
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 5m
  modules-download-mode: readonly
